services:
  nginx:
    #specify the Dockerfile location to install nginx
    build: ./requirements/nginx

    #to read the static file
    volumes:
      - wp_data:/var/www/html

    #assign a name for this container
    container_name: nginx

    #port specification
    ports:
     - "443:443"

    # if container crashes, we need to restart it 
    restart: always

  wordpress:
    build: ./requirements/wordpress

    volumes:
      - wp_data:/var/www/html
   
    container_name: wordpress
    restart: always
    environment:
      MYSQL_DATABASE: ${MYSQL_DATABASE} 
      MYSQL_USER: ${MYSQL_USER} 
      MYSQL_PASSWORD: ${MYSQL_PASSWORD}
      WP_URL: ${WP_URL}
      WP_TITLE: ${WP_TITLE}
      WP_ADMIN_USER: ${WP_ADMIN_USER}
      WP_ADMIN_PASSWORD: ${WP_ADMIN_PASSWORD}
      WP_ADMIN_EMAIL: ${WP_ADMIN_EMAIL}


  mariadb:
    build: ./requirements/mariadb

    volumes:
      - db_data:/var/lib/mysql

    container_name: mariadb
    restart: always

    #prepare for introducing the environnement variable inside .env file
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD} 
      MYSQL_DATABASE: ${MYSQL_DATABASE} 
      MYSQL_USER: ${MYSQL_USER} 
      MYSQL_PASSWORD: ${MYSQL_PASSWORD}

volumes:
  db_data:
    driver: local
    driver_opts:
      type: 'none'
      o: 'bind'
      device: '${DATA_PATH}/mariadb'

  wp_data:
    driver: local
    driver_opts:
      type: 'none'
      o: 'bind'
      device: '${DATA_PATH}/wordpress'
