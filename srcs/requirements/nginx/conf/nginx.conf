events {
	worker_connections 1024;
}

http {
	server {
		listen 443 ssl;
		listen [::]:443 ssl;
		
		server_name yanzhao.42.fr;

		ssl_certificate /etc/nginx/ssl/inception.crt;
		ssl_certificate_key /etc/nginx/ssl/inception.key;
		ssl_protocols TLSv1.2 TLSv1.3;

		root /var/www/html;
		index index.html;

		location /
		{
			try_files $uri $uri/ /index.php?$args;
		}
	}
}
